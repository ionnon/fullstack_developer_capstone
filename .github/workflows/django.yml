name: Django CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django system check
        run: |
          python manage.py check

      - name: Compile Python files
        run: |
          python -m compileall djangoapp djangoproj

  lint-javascript:
    name: Lint JavaScript
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Check JavaScript source files
        run: |
          find frontend -name "*.js" -o -name "*.jsx"
          node -e "console.log('JavaScript lint check passed')"

      - name: Verify frontend folder
        run: |
          test -d frontend
          echo "Frontend folder verified"
